# site properties and page defaults
title: June 13th, 2027 in Pescadero, CA
header: images/tidescape.jpg
footer: images/oasis.jpg
proofer: false

# site social media and other links
links:
  email: jandjweddinghotline@gmail.com

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_lodgings
  - scope:
      type: "lodgings"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: false
  # generate page for each lodging entry
  lodgings:
    output: false

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff

# configure jekyll spaceship
jekyll-spaceship:
  mathjax-processor:
    src:
      - https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js
