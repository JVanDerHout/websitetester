<style>
  body { cursor: none; }
  #pie-cursor {
    position: fixed;
    width: 40px;
    height: 40px;
    pointer-events: none;
    z-index: 9999;
    left: 0;
    top: 0;
    transform: translate(-100px, -100px);
  }
</style>

<div id="pie-cursor">
  <svg width="40" height="40" viewBox="0 0 40 40">
    <path d="M20 20 L37 10 A19 19 0 0 1 37 30 Z" fill="#8B4A2B"></path>
    <path d="M20 20 L34.5 11.5 A15.5 15.5 0 0 1 34.5 28.5 Z" fill="#B5432F"></path>
    <circle cx="26" cy="16" r="1.6" fill="#6B1F1F"></circle>
    <circle cx="29.5" cy="22" r="1.6" fill="#6B1F1F"></circle>
    <circle cx="25" cy="24.5" r="1.6" fill="#6B1F1F"></circle>
    <circle cx="30" cy="15.5" r="1.4" fill="#6B1F1F"></circle>
  </svg>
</div>

<script>
  const pie = document.getElementById('pie-cursor');
  document.addEventListener('mousemove', (e) => {
    pie.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
  });
</script>
