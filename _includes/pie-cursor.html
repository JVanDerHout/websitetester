<style>
  body { cursor: none; }
  #pie-cursor {
    position: fixed;
    width: 48px;
    height: 48px;
    pointer-events: none;
    z-index: 9999;
    left: 0;
    top: 0;
    transform: translate(-100px, -100px);
  }
</style>

    <circle cx="14.77" cy="23.95" r="1.3" fill="#F0567A"></circle>
    <circle cx="19.5" cy="35.11" r="1.3" fill="#F0567A"></circle>

</div>

<script>
  const pie = document.getElementById('pie-cursor');
  document.addEventListener('mousemove', (e) => {
    pie.style.transform = `translate(${e.clientX - 8}px, ${e.clientY - 8}px)`;
  });
</script>
